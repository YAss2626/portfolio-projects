<!DOCTYPE html>
<html>
  <head>
    <title>Mars Base</title>
    <meta name="description" content="A-Frame Mars Base Hub (custom collisions)">
    <script src="https://aframe.io/releases/1.7.0/aframe.min.js"></script>

    <!-- add extras  -->
    <script src="https://cdn.jsdelivr.net/gh/c-frame/aframe-extras@7.6.0/dist/aframe-extras.min.js"></script>

    <script src="/js/spinning-effect.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/aframe-environment-component@1.3.3/dist/aframe-environment-component.min.js"></script>
    <script src="js/sound-manager.js"></script>
    <script src="js/game.js"></script>
    <script src="js/npc-dialogue.js"></script>

    
    
    <style>
      html, body { margin:0; height:100%; background:#000; overflow:hidden; }
    </style>
  </head>
  <body>

    <a-scene background="color:#101218">
      <a-assets>
        <a-asset-item id="doorGLB" response-type="arraybuffer" src="assets/door.glb"></a-asset-item>
        <a-asset-item id="phobos" response-type="arraybuffer" src="assets/phobos.glb"></a-asset-item>
        <a-asset-item id="deimos" response-type="arraybuffer" src="assets/deimos_centered.glb"></a-asset-item>
        <a-asset-item id="jupiter" response-type="arraybuffer" src="assets/jupiter.glb"></a-asset-item>
        <a-asset-item id="basaltRock" response-type="arraybuffer" src="assets/basalt.glb"></a-asset-item>
        <a-asset-item id="duniteRock" response-type="arraybuffer" src="assets/dunite.glb"></a-asset-item>
        <a-asset-item id="hematiteRock" response-type="arraybuffer" src="assets/hematite.glb"></a-asset-item>
        <a-asset-item id="gypsumRock" response-type="arraybuffer" src="assets/gypsum-centered.glb"></a-asset-item>
        <a-asset-item id="sciFiTable" response-type="arraybuffer" src="assets/sci-fi_table.glb"></a-asset-item>
        <a-asset-item id="olympusGLB" src="assets/mars_-_olympus_mons.glb"></a-asset-item>
        <a-asset-item id="sojournerRover" response-type="arraybuffer" src="assets/sojournerRover.glb"></a-asset-item>
        <a-asset-item id="opportunityRover" response-type="arraybuffer" src="assets/opportunity.glb"></a-asset-item>
        <a-asset-item id="perseveranceRover" response-type="arraybuffer" src="assets/perseverance.glb"></a-asset-item>
        <a-asset-item id="jezeroCraterGLB" response-type="arraybuffer" src="assets/jezeroCrater.glb"></a-asset-item>
        <a-asset-item id="astronaut_missions" response-type="arraybuffer" src="assets/astronaut.glb"></a-asset-item>

        
        <img id="helmetOverlayImg" src="assets/helmetview.png">
        <img id="olympusOrbit" src="assets/olympus_orbit.jpg">
        <img id="mars1" src="assets/mars1.jpg">
        <img id="mars2" src="assets/mars2.jpg">
        <img id="textBG_1" src="assets/textBG_1.jpg">
        <img id="textBG_2" src="assets/textBG_2.jpg">
        <img id="textBG_3" src="assets/textBG_3.jpg">
        <img id="hubBG" src="assets/hubBG.png">
        <img id="opportunityTexture" src="assets/opportunityTexture.png">
        
        <!-- SOUND ASSETS  -->
        <!-- Ambient sounds -->
        <audio id="sndAmbientWindExt" src="sounds/427401_imjeax_desert-ambient-loop.wav"></audio>
        <audio id="sndAmbientInterior" src="sounds/524951_burning-mir_space-ambient-v02.wav"></audio>
        
        <!-- Interaction sounds -->
        <audio id="sndDoorOpen" src="sounds/468937_timothyd4y_closet-doorknob-turn.wav"></audio>
        <audio id="sndFootstep" src="sounds/477394__nuff3__steps-dirt_3b.ogg"></audio>
        <audio id="sndRockScan" src="sounds/735168__irolan__item-pickup-chime.wav"></audio>
        <audio id="sndUIClick" src="sounds/677861__el_boss__ui-button-click.wav"></audio>
        
        <!-- Quiz sounds -->
        <audio id="sndQuizCorrect" src="sounds/456162_bwg2020_correct-2.wav"></audio>
        <audio id="sndQuizWrong" src="sounds/720893_baggonotes_incorrect_buzz.wav"></audio>
        
        <!-- Lab analysis sound -->
        <audio id="sndLabAnalysis" src="sounds/340959__aceofspadesproduc100__scanning-sound.wav"></audio>

        <audio id="sndBaseAmbience" src="sounds/524951__burning-mir__space-ambient-v02.wav"></audio>
        <audio id="sndMissionComplete" src="sounds/433700__dersuperanton__mission-completed-deep-voice.wav"></audio>
        <audio id="sndRoverIdle" src="sounds/353263__thespiderwriter__droid-hum.mp3"></audio>
      </a-assets>

      <!-- RIG that moves -->
      <a-entity id="rig"
                  position="0 0 0"
                  fp-controls="speed:7; radius:0.35"
                  sound-manager
                  footstep-sound="interval: 150"
                  audio-zone-controller>

      <a-entity id="camera"
                camera
                position="0 1.6 0"
                look-controls="pointerLockEnabled: false; magicWindowTrackingEnabled: true">
        <a-entity cursor="rayOrigin: mouse"
                  raycaster="objects: .interactive; far: 20"></a-entity>
        
        <!--Helmet overlay-->
        <a-image id="helmetOverlay"
                src="#helmetOverlayImg"
                position="0 0 -0.6"
                width="2"
                height="1"
                material="transparent: true; opacity: 0.5; depthTest: false; side: double"
                visible="false"
                hud-vr-scale="desktop: 1; vr: 0.5 "
                hud-vr-position="desktop: 0 0 -0.6; vr: 0 0 -0.45">
        </a-image>

        
        <!--Foggy breath effect-->
        <a-plane id="breathFog"
           position="0 0 -0.6"
           width="2"
           height="1"
           color="#ffffff"
           material="transparent: true; opacity: 0; depthTest: false; side: double"
           animation="property: material.opacity;
                      dir: alternate;
                      dur: 1600;
                      from: 0;
                      to: 0.15;
                      loop: true"
           visible="false">
        </a-plane>

        <!-- HUD notification -->
        <a-entity id="notificationText"
                  position="0 -0.3 -1"
                  text="value: ;
                        align: center;
                        width: 2;
                        color: #4fa84a;"
                  visible="false">
        </a-entity>

        <!-- PLAY AGAIN BUTTON (HUD) -->
        <a-entity id="playAgainButton"
                  class="interactive"
                  position="0 -0.65 -1"
                  geometry="primitive: plane; width: 0.9; height: 0.22"
                  material="color: #222; opacity: 0.9; transparent: true; side: double;"
                  visible="false"
                  play-again-button
                  ui-sound>
          <a-entity position="0 0 0.01"
                    text="value: Play again;
                          align: center;
                          width: 1.8;
                          color: #ffffff;">
          </a-entity>
        </a-entity>


        <!-- HUD BAR -->
        <a-entity id="oxygenHUD" position="-1.1 -0.8 -1"
                                 hud-vr-scale="desktop: 1; vr: 0.6"
                                 hud-vr-position="desktop: -0.85 -0.7 -1; vr: -0.45 -0.45 -1">

          <!-- Background -->
          <a-plane width="0.8" height="0.12"
                  color="#111"
                  opacity="0.8"
                  material="side: double; depthTest: false; depthWrite: false; transparent: true">
          </a-plane>

          <!-- Fill bar  -->
          <a-plane id="oxygenBar"
                  position="-0.38 0 0.01"
                  width="0.76"
                  height="0.08"
                  color="#00e5ff"
                  material="side: double; depthTest: false; depthWrite: false; transparent: true">
          </a-plane>

          <!-- Text percentage -->
          <a-entity id="oxygenText"
                    position="-0.05 0 0.02"
                    text="value: Hub O2: 100%;
                          align: center;
                          width: 1.5;
                          color: #ffffff;">
          </a-entity>
        </a-entity>

                <!-- SUIT OXYGEN HUD BAR -->
        <a-entity id="suitHUD" position="1.1 -0.8 -1"
                               hud-vr-scale="desktop: 1; vr: 0.6"
                               hud-vr-position="desktop: 0.85 -0.7 -1; vr: 0.45 -0.45 -1">

          <!-- Background -->
          <a-plane width="0.8" height="0.12"
                   color="#111"
                   opacity="0.8"
                   material="side: double; depthTest: false; depthWrite: false; transparent: true">
          </a-plane>

          <!-- Fill bar -->
          <a-plane id="suitOxygenBar"
                   position="-0.38 0 0.01"
                   width="0.76"
                   height="0.08"
                   color="#00ff9d"
                   visible="false"
                   material="side: double; depthTest: false; depthWrite: false; transparent: true">
          </a-plane>

          <!-- Text -->
          <a-entity id="suitOxygenText"
                    position="-0.05 0 0.02"
                    text="value: Suit O2: 100%;
                          align: center;
                          width: 1.5;
                          color: #ffffff;"
                    visible="false">
          </a-entity>
        </a-entity>


        <!-- RED WARNING OVERLAY  -->
        <a-entity id="oxygenWarningOverlay"
                  geometry="primitive: plane; width: 2; height: 2"
                  position="0 0 -0.6"
                  material="color: #ff0000;
                            opacity: 0;
                            transparent: true;
                            side: double;"
                  visible="false">
        </a-entity>
      </a-entity>



        <!-- LEFT HAND (movement + click) -->
        <a-entity id="leftHand"
                  laser-controls="hand: left"
                  raycaster="objects: .interactive; far: 20; showLine: true"
                  cursor="fuse: false; rayOrigin: entity; downEvents: triggerdown; upEvents: triggerup">
        </a-entity>

        <!-- RIGHT HAND (turning + click) -->
        <a-entity id="rightHand"
                  laser-controls="hand: right"
                  raycaster="objects: .interactive; far: 20; showLine: true"
                  cursor="fuse: false; rayOrigin: entity; downEvents: triggerdown; upEvents: triggerup">
        </a-entity>


      </a-entity>

      <!-- Clean readable welcome text -->
      <a-entity id="welcomeText"
                position="0 2 -3"
                text="value: Welcome to the Mars Base. Here you will explore the planet and the whole solar system.;
                      align: center;
                      width: 4;
                      color: #ffd480;
                      wrapCount: 40;
                      shader: standard;">
        <a-animation attribute="position"
                      from="0 2 -3"
                      to="0 2.2 -3"
                      dur="2500"
                      direction="alternate"
                      easing="easeInOutSine"
                      repeat="indefinite"></a-animation>
      </a-entity>


      <a-entity id="phobos" position="4 1.78 3" scale="0.03 0.03 0.03"
                gltf-model="#phobos"
                animation="property:rotation; to:0 360 0; loop:true; dur:30000"
                spatial-sound="src: sounds/524951__burning-mir__space-ambient-v02.wav; loop: true; volume: 0.3; refDistance: 1; maxDistance: 8"
                shadow></a-entity>

      <a-entity id="deimos" position="4.172 1.78 0.745" scale="0.0005 0.0005 0.0005"
                gltf-model="#deimos"
                animation="property:rotation; to:0 360 0; loop:true; dur:30000"
                shadow></a-entity>


      <a-entity id="jupiter" position="0.72 1.78 4.6" rotation="0 0 0" scale="0.3 0.3 0.3"
                gltf-model="#jupiter"
                animation="property:rotation; to:0 360 0; loop:true; dur:30000"
                spatial-sound="src: sounds/524951__burning-mir__space-ambient-v02.wav; loop: true; volume: 0.4; refDistance: 1.5; maxDistance: 10"
                shadow></a-entity>
                  
      <a-entity id="phobos_info_panel" position="3.463 0.7 3.3" rotation="-30 -90 0">
        <a-plane width="2.0" height="1"
                  src="#textBG_2"
                  material="opacity: 0.95; side: double; shader: flat;"
                  shadow></a-plane>
        <a-entity text="value: Phobos is the larger of Mars' two moons, known for its irregular, potato-like shape and close orbit. It is spiraling closer to Mars and may crash or form a ring in ~50 million years.;
                        color: white;
                        wrapCount: 40;
                        align: center;
                        baseline: center;
                        width: 2;
                        shader: msdf;
                        font: https://cdn.aframe.io/fonts/Roboto-msdf.json;"
                  position="0 0 0.01">
        </a-entity>
      </a-entity>

      <a-entity id="deimos_info_panel" position="3.463 0.7 0.717" rotation="-30 -90 0">
        <a-plane width="2.0" height="1"
                  src="#textBG_3"
                  material="opacity: 0.95; side: double; shader: flat;"
                  shadow></a-plane>
        <a-entity text="value: Deimos is Mars smaller, outer moon—smoother and dust-draped, with a rounded rubble-pile shape. It orbits farther out (~23,460 km) every ~30 hours and is slowly drifting away over time.;
                        color: white;
                        wrapCount: 40;
                        align: center;
                        baseline: center;
                        width: 2;
                        shader: msdf;
                        font:	https://cdn.aframe.io/fonts/Roboto-msdf.json"
                  position="0 0 0.01">
        </a-entity>
      </a-entity>

            <!-- EVA SUIT LOCKER / STATION -->
      <a-entity id="evaSuitStation"
                position="-4.622 1 0.69"
                rotation="0 90 0">

        <!-- Locker body -->
        <a-box width="0.9" height="1.9" depth="0.5"
               material="color: #333; metalness: 0.2; roughness: 0.8;">
        </a-box>

        <!-- Title text -->
        <a-entity position="0 1.2 0.26"
                  text="value: EVA Suit Station;
                        align: center;
                        width: 2;
                        color: #ffd480;">
        </a-entity>

        <!-- Interactive button -->
        <a-entity id="evaSuitButton"
                  class="interactive"
                  position="0 0.6 0.26"
                  geometry="primitive: box; width: 0.6; height: 0.22; depth: 0.04;"
                  material="color: #0066ff; metalness: 0.3; roughness: 0.5"
                  eva-suit-station
                  ui-sound>
          <a-entity position="0 0 0.02"
                    text="value: Put suit on;
                          align: center;
                          width: 1.4;
                          color: #ffffff;">
          </a-entity>
        </a-entity>
      </a-entity>



      <!-- Base walls (front open) -->
      <a-box class="solid" position="-5 1.2 0" width="0.2" height="2.4" depth="10" color="#e9ecef"></a-box>
      <a-box class="solid" position="5 1.2 0"  width="0.2" height="2.4" depth="10" color="#e9ecef"></a-box>
      <a-box class="solid" position="0 1.2 5"  width="10"  height="2.4" depth="0.2" color="#e9ecef"></a-box>
      <a-box position="0 2.4 0" width="10" height="0.2" depth="10" color="#dfe6e9"></a-box>
      <a-box position="0 0.05 0" width="10" height="0.1" depth="10" color="#c8d6e5"></a-box>

      <!-- FRONT WALLS -->
      <a-box class="solid"
              position="-3.25 1.2 -5"
              width="3.5" height="2.4" depth="0.2"
              color="#e9ecef"></a-box>

      <a-box class="solid"
              position="3.25 1.2 -5"
              width="3.5" height="2.4" depth="0.2"
              color="#e9ecef"></a-box>

      <!-- Left wall image -->
      <a-plane src="#mars1"
                position="-3.2 1.2 -4.8"
                rotation="0 0 0"
                scale="2 2 2"
                width="1.2" height="0.8"
                material="side:double; shader:flat;">
      </a-plane>

      <!-- Right wall image -->
      <a-plane src="#mars2"
                position="3.22 1.2 -4.8"
                rotation="0 0 0"
                scale="2 2 2"
                width="1.2" height="0.8"
                material="side:double; shader:flat;">
      </a-plane>

      <!-- EXTENDED TUNNEL -->
      <a-box class="solid"
              position="-1.5 1.2 -9.5"
              width="0.2" height="2.4" depth="9"
              color="#999"></a-box>

      <a-box class="solid"
              position="1.5 1.2 -9.5"
              width="0.2" height="2.4" depth="9"
              color="#999"></a-box>

      <a-box position="0 0.05 -9.5"
              width="3" height="0.1" depth="9"
              color="#bfc9ca"></a-box>

      <a-box position="0 2.4 -9.5"
              width="3" height="0.2" depth="9"
              color="#b0b0b0"></a-box>

      <!-- Doors with interactive-door component + wall buttons -->

      <!-- OUTER DOOR -->
      <a-entity id="outerDoorHinge"
                  position="1.5 0 -13.97"
                  rotation="0 0 0"
                  interactive-door="openAngle: -90; duration: 1000"
                  door-sound>

        <!-- Door mesh (NOT interactive) -->
        <a-entity id="outerDoorModel"
                  gltf-model="#doorGLB"
                  ignore-raycast
                  position="-1.5 2.326 0"
                  rotation="0 0 0"
                  scale="0.024 0.011 0.01">
        </a-entity>
      </a-entity>

      <!-- Buttons for OUTER DOOR -->
      <a-entity id="outerDoorButtonInside"
                class="interactive"
                position="1.37 1.2 -12.63"
                rotation="0 0 90"
                geometry="primitive: cylinder; radius: 0.1; height: 0.05"
                material="color: #00b894; metalness: 0.3; roughness: 0.5"
                door-button="target: #outerDoorHinge"
                ui-sound>
        <a-entity position="0.283 -0.023 0"
                  rotation="-90 -90 0"
                  text="value: OPEN;
                        align: center;
                        width: 1.5;
                        color: #ffffff;">
        </a-entity>
      </a-entity>

      <!-- Platform + button for OUTER DOOR (outside) -->
      <a-entity id="outerDoorButtonOutsidePlatform"
                position="-1.86 0 -14.4">

        <!-- The little box it stands on -->
        <a-entity position="0 0.3 0"
                  geometry="primitive: box; width: 0.4; depth: 0.4; height: 0.3;"
                  material="color: #ffffff; metalness: 0.1; roughness: 0.8;"
                  shadow>
        </a-entity>

        <!-- The actual clickable button on top -->
        <a-entity id="outerDoorButtonOutside"
                  class="interactive"
                  position="0 0.48 0"
                  geometry="primitive: cylinder; radius: 0.1; height: 0.05"
                  material="color: #00b894; metalness: 0.3; roughness: 0.5"
                  door-button="target: #outerDoorHinge; verticalPress: true"
                  ui-sound>

          <!-- Text label for OPEN/CLOSE -->
          <a-entity position="0 0.18 0"
                    rotation="0 180 0"
                    text="value: OPEN;
                          align: center;
                          width: 1.5;
                          color: #ffffff;">
          </a-entity>
        </a-entity>
      </a-entity>
    </a-entity>



      <!-- INNER DOOR -->
      <a-entity id="innerDoorHinge"
                position="1.5 0 -5.055"
                interactive-door="
                  openAngle: -90; duration: 1000;
                  closedPos: 0.002 1.2 -5.055;
                  openPos:   1.57  1.2 -6.084;
                  closedSize: 3 2.4 0.05;
                  openSize:   0.05 2.4 3"
                  door-sound>

        <!-- Door mesh (NOT interactive) -->
        <a-entity id="innerDoorModel"
                  gltf-model="#doorGLB"
                  ignore-raycast
                  position="-1.5 2.326 0.1"
                  rotation="0 0 0"
                  scale="0.024 0.011 0.01">
        </a-entity>
      </a-entity>

      <!-- Buttons for INNER DOOR -->
      <a-entity id="innerDoorButtonInside"
                class="interactive"
                position="1.76 1.2 -4.868"
                rotation="270 0 0"
                geometry="primitive: cylinder; radius: 0.1; height: 0.05"
                material="color: #0984e3; metalness: 0.3; roughness: 0.5"
                door-button="target: #innerDoorHinge"
                ui-sound>
        <a-entity position="-0.043 -0.11 0.2"
                  rotation="90 0 0"
                  text="value: OPEN;
                        align: center;
                        width: 1.5;
                        color: #ffffff;">
        </a-entity>
      </a-entity>

      <a-entity id="innerDoorButtonOutside"
                class="interactive"
                position="-1.33 1.2 -7.5"
                rotation="0 0 90"
                geometry="primitive: cylinder; radius: 0.1; height: 0.05"
                material="color: #0984e3; metalness: 0.3; roughness: 0.5"
                door-button="target: #innerDoorHinge"
                ui-sound>
        <a-entity position="0.25 0.03 0"
                  rotation="90 90 0"
                  text="value: OPEN;
                        align: center;
                        width: 1.5;
                        color: #ffffff;">
        </a-entity>
      </a-entity>


      <!-- MARS FACTS TERMINAL -->
      <a-entity id="marsFactsTerminal"
                position="-4.435 1.1 2.74"
                rotation="0 90 0">

        <!-- Background panel -->
        <a-plane width="2.2" height="1.3"
                material="color: #111; opacity: 0.9; side: double">
        </a-plane>

        <!-- Title -->
        <a-entity position="0.84 0.873 -0.24"
                  text="value: Mars Facts;
                        align: left;
                        width: 2.4;
                        color: #9a7432;">
        </a-entity>

        <!-- Topic buttons on the left -->
        <a-entity id="marsFactButtonAtmosphere"
                  class="interactive"
                  position="-1.52 0.15 0.02"
                  geometry="primitive: box; width: 0.7; height: 0.18; depth: 0.02;"
                  material="color: #263238"
                  mars-fact-button="topic: atmosphere"
                  ui-sound>
          <a-entity position="0 0 0.01"
                    text="value: Atmosphere;
                          align: center;
                          width: 0.9;
                          color: #ffffff;">
          </a-entity>
        </a-entity>

        <a-entity id="marsFactButtonWater"
                  class="interactive"
                  position="-1.52 -0.1 0.02"
                  geometry="primitive: box; width: 0.7; height: 0.18; depth: 0.02;"
                  material="color: #263238"
                  mars-fact-button="topic: water"
                  ui-sound>
          <a-entity position="0 0 0.01"
                    text="value: Water & Ice;
                          align: center;
                          width: 0.9;
                          color: #ffffff;">
          </a-entity>
        </a-entity>

        <a-entity id="marsFactButtonMissions"
                  class="interactive"
                  position="-1.52 -0.35 0.02"
                  geometry="primitive: box; width: 0.7; height: 0.18; depth: 0.02;"
                  material="color: #263238"
                  mars-fact-button="topic: missions"
                  ui-sound>
          <a-entity position="0 0 0.01"
                    text="value: Missions;
                          align: center;
                          width: 0.9;
                          color: #ffffff;">
          </a-entity>
        </a-entity>

        <!-- Text area on the right -->
        <a-entity id="marsFactsText"
                  position="0 0 0.02"
                  text="value: Tap a topic to learn more about Mars.;
                        align: left;
                        width: 1.8;
                        wrapCount: 35;
                        color: #ffffff;">
        </a-entity>
      </a-entity>

      <!-- SCORE PANEL -->
      <a-entity id="scorePanel"
                position="2 1.3 4.6"
                rotation="0 180 0">

        <!-- Background -->
        <a-plane width="1.4" height="0.5"
                position="0 0 -0.05"
                material="color: #111; opacity: 0.9; side: double;">
        </a-plane>

        <!-- Score text (updated by score system) -->
        <a-entity id="scoreText"
                  position="0 0 0.01"
                  text="value: Explorer Points: 0;
                        align: center;
                        width: 1.6;
                        color: #ffd480;">
        </a-entity>
      </a-entity>


      <!-- Sojourner rover with quiz -->
      <a-entity id="sojournerRoverRoot"
                position="26 1.2 38"
                rotation="0 180 0"
                rover-quiz
                spatial-sound="src: sounds/353263__thespiderwriter__droid-hum.mp3; loop: true; volume: 0.3; refDistance: 2; maxDistance: 8">
>  

        <!-- Rover model  -->
        <a-entity id="sojournerModel"
                  gltf-model="#sojournerRover"
                  position="0 0 0"
                  rotation="0 30 0"
                  scale="0.003 0.003 0.003"> 
        </a-entity>

        <!-- Floating hint above rover -->
        <a-entity class="rover-hint"
                  position="0 1.5 0"
                  text="value: Click rover to learn more;
                        align: center;
                        width: 3;
                        color: #ffd480;"
                  animation="property: position;
                            dir: alternate;
